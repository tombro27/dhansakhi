      <stop stop-color="#0a2540"/>
      <stop offset="1" stop-color="#0f3a5c"/>
    </linearGradient>
    <linearGradient id="ds-leaf" x1="14" y1="34" x2="34" y2="12" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00936b"/>
      <stop offset="1" stop-color="#2fd4a4"/>
